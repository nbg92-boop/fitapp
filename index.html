function bip(f,d,v){try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;o.type="sine";g.gain.value=v||.2;o.start();o.stop(a.currentTime+(d||.12));setTimeout(()=>a.close(),400)}catch(e){}}

const RTS=[
{id:"d1",nm:"Dia 1 - Brazos+Espalda",cl:"#3b82f6",dr:"~35min",w:[{id:"d1e1",nm:"Curl biceps",rp:"12",ms:"Biceps",sv:"curl",tp:"Codos pegados. Sube lento."},{id:"d1e2",nm:"Remos verticales",rp:"8",ms:"Hombro",sv:"remo_vert",tp:"Hasta barbilla."},{id:"d1e3",nm:"Elev. laterales",rp:"8",ms:"Hombro",sv:"elev_lat",tp:"Altura hombros."},{id:"d1e4",nm:"Encogimientos",rp:"8",ms:"Trapecios",sv:"encog",tp:"1s arriba."},{id:"d1e5",nm:"Remo inclinado",rp:"8",ms:"Espalda",sv:"remo_inc",tp:"45 grados."}],tb:[{nm:"Jumping Jacks",sv:"jumping"},{nm:"Seal Jacks",sv:"seal"},{nm:"Mountain Climbers",sv:"mountain"},{nm:"Burpees",sv:"burpee"}]},
{id:"d2",nm:"Dia 2 - Piernas+Core",cl:"#10b981",dr:"~35min",w:[{id:"d2e1",nm:"Lunges",rp:"12",ms:"Piernas",sv:"lunge",tp:"Rodillas 90."},{id:"d2e2",nm:"Thrusters",rp:"12",ms:"Full body",sv:"thruster",tp:"Sentadilla+press."},{id:"d2e3",nm:"Goblet Squat",rp:"12",ms:"Cuadriceps",sv:"goblet",tp:"Baja profundo."},{id:"d2e4",nm:"Glute Bridge",rp:"12",ms:"Gluteo",sv:"glute",tp:"Aprieta arriba."}],tb:[{nm:"Crunches",sv:"crunch"},{nm:"Russian Twist",sv:"russian"},{nm:"Flutter Kicks",sv:"flutter"},{nm:"Elev. piernas",sv:"elev_pier"}]},

];
const UV={id:"uv",nm:"Modo Ultravago",cl:"#f59e0b",dr:"~20min",w:[{id:"uve1",nm:"Sentadilla",rp:"12",ms:"Piernas",sv:"goblet",tp:"Sin peso OK."},{id:"uve2",nm:"Press",rp:"10",ms:"Pecho",sv:"press_pec",tp:"Ligero."},{id:"uve3",nm:"Remo",rp:"12",ms:"Espalda",sv:"remo_inc",tp:"Controlado."},{id:"uve4",nm:"Plancha",rp:"30s",ms:"Core",sv:"plancha",tp:"Rodillas si necesitas."}]};

function loadData(wk){try{var r=localStorage.getItem("fp5");if(r){var p=JSON.parse(r);if(p.cw!==wk){var oldPts=0;Object.entries(p.wc||{}).forEach(([d,c])=>{if([1,3,4].includes(+d)&&c.gym)oldPts+=2;if(c.steps)oldPts+=1;if(+d===0&&c.pilates)oldPts+=1;HABITS.forEach(h=>{if(c[h.k])oldPts+=h.p})});p.streakWeeks=p.streakWeeks||0;if(oldPts>=WEEKLY_GOAL)p.streakWeeks+=1;else p.streakWeeks=0;p.weekHistory=p.weekHistory||[];p.weekHistory.push({week:p.cw,pts:Math.round(oldPts*10)/10});p.wc={};p.cw=wk;p.rd=[];}p.ew=p.ew||{};p.rd=p.rd||[];p.wl=p.wl||[];p.wh=p.wh||{};p.streakWeeks=p.streakWeeks||0;p.weekHistory=p.weekHistory||[];return p;}}catch(e){}return{wc:{},cw:wk,wl:[],ew:{},rd:[],wh:{},streakWeeks:0,weekHistory:[]};}
function saveD(d){try{localStorage.setItem("fp5",JSON.stringify(d))}catch(e){}}

function RestTimer({secs,color}){
  const S=secs||60,ref=useRef(null);const[left,setLeft]=useState(S);const[on,setOn]=useState(false);
  useEffect(()=>{if(!on)return;ref.current=setInterval(()=>{setLeft(p=>{var n=p-1;if(n<=0){clearInterval(ref.current);setOn(false);bipDone();return S}if(n===45||n===30||n===15)bip(880,.12,.2);if(n<=10&&n>0)bip(600,.08,.12);if(n===3)bip(1200,.18,.3);return n})},1000);return()=>clearInterval(ref.current)},[on,S]);
  var pct=left/S,R=34,C=2*Math.PI*R,tc=on?(left<=10?"#ef4444":color):"#555570";
  return(<div style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:on?"rgba(255,255,255,.05)":"rgba(255,255,255,.02)",borderRadius:12,marginTop:10,border:"1px solid "+(on?color+"55":"rgba(255,255,255,.06)")}}>
    <div style={{position:"relative",width:52,height:52,flexShrink:0}}><svg width="52" height="52" viewBox="0 0 76 76"><circle cx="38" cy="38" r={R} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="4.5"/><circle cx="38" cy="38" r={R} fill="none" stroke={tc} strokeWidth="4.5" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C*(1-pct)} transform="rotate(-90 38 38)" style={{transition:"stroke-dashoffset .3s"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:tc,fontFamily:"monospace"}}>{left}</div></div>
    <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:on?color:"#8888aa",marginBottom:4}}>Descanso</div>{!on?<button onClick={()=>{setLeft(S);setOn(true);bip(880,.12,.2)}} style={{padding:"8px 20px",borderRadius:10,border:"none",background:color+"22",color,fontSize:13,fontWeight:700,cursor:"pointer"}}>Iniciar {S}s</button>:<button onClick={()=>{clearInterval(ref.current);setOn(false);setLeft(S)}} style={{padding:"8px 20px",borderRadius:10,border:"none",background:"rgba(239,68,68,.1)",color:"#ef4444",fontSize:13,fontWeight:700,cursor:"pointer"}}>Parar</button>}</div></div>);
}

function TabataTimer({exercises,color}){
  var W=20,R=10,RDS=2,tot=exercises.length;const ref=useRef(null);
  const[run,setRun]=useState(false);const[rd,setRd]=useState(1);const[ei,setEi]=useState(0);const[ph,setPh]=useState("work");const[left,setLeft]=useState(W);const[done,setDone]=useState(false);
  useEffect(()=>{if(!run)return;ref.current=setInterval(()=>{setLeft(p=>{var n=p-1;if(n<=3&&n>0)bip(600,.08,.12);if(n<=0){if(ph==="work"){if(ei<tot-1){bip(500,.25,.25);setPh("rest");return R}else if(rd<RDS){bipDone();setPh("rr");return 90}else{bipDone();setRun(false);setDone(true);clearInterval(ref.current);return 0}}if(ph==="rest"){bip(1000,.25,.35);setPh("work");setEi(i=>i+1);return W}if(ph==="rr"){bip(1000,.25,.35);setPh("work");setRd(r=>r+1);setEi(0);return W}}return n})},1000);return()=>clearInterval(ref.current)},[run,ph,ei,rd,tot]);
  var reset=()=>{clearInterval(ref.current);setRun(false);setRd(1);setEi(0);setPh("work");setLeft(W);setDone(false)};
  var pC=ph==="work"?"#22c55e":ph==="rest"?"#f59e0b":"#3b82f6",pL=ph==="work"?"TRABAJA":ph==="rest"?"DESCANSO":"CAMBIO RONDA",cur=exercises[Math.min(ei,tot-1)],maxT=ph==="work"?W:ph==="rest"?R:90,pct=left/maxT,cR=44,cC=2*Math.PI*cR;
  if(done)return(<div style={{padding:16,textAlign:"center",background:"rgba(34,197,94,.06)",borderRadius:12,border:"1px solid rgba(34,197,94,.2)",marginTop:8}}><div style={{fontSize:36}}>🏆</div><div style={{fontSize:16,fontWeight:800,color:"#22c55e",marginTop:4}}>TABATA COMPLETADO</div><button onClick={reset} style={{marginTop:10,padding:"8px 20px",borderRadius:10,border:"none",background:color+"22",color,fontSize:13,fontWeight:700,cursor:"pointer"}}>Repetir</button></div>);
  return(<div style={{background:"#111122",borderRadius:14,overflow:"hidden",marginTop:8,border:"1px solid rgba(255,255,255,.08)"}}>
    <div style={{padding:"12px 16px",background:pC+"15",textAlign:"center"}}><div style={{fontSize:12,fontWeight:700,color:pC,letterSpacing:1}}>{pL}</div>{ph==="work"&&<div style={{fontSize:14,fontWeight:800,color:"#f0f0f5",marginTop:4}}>{EXE[cur.sv]||"🏃"} {cur.nm}</div>}<div style={{fontSize:11,color:"#8888aa",marginTop:2}}>Ronda {rd}/{RDS} - Ej {ei+1}/{tot}</div></div>
    <div style={{display:"flex",justifyContent:"center",padding:"16px 0"}}><div style={{position:"relative",width:100,height:100}}><svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r={cR} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="6"/><circle cx="50" cy="50" r={cR} fill="none" stroke={left<=5?"#ef4444":pC} strokeWidth="6" strokeLinecap="round" strokeDasharray={cC} strokeDashoffset={cC*(1-pct)} transform="rotate(-90 50 50)" style={{transition:"stroke-dashoffset .3s"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:36,fontWeight:800,color:left<=5?"#ef4444":pC,fontFamily:"monospace"}}>{left}</div></div></div></div>
    <div style={{display:"flex",gap:4,padding:"0 12px 8px",justifyContent:"center",flexWrap:"wrap"}}>{exercises.map((ex,i)=><div key={i} style={{padding:"3px 8px",borderRadius:6,fontSize:10,fontWeight:600,background:i===ei?pC+"22":"rgba(255,255,255,.03)",color:i===ei?pC:i<ei?"#555570":"#8888aa"}}>{ex.nm}</div>)}</div>
    <div style={{display:"flex",gap:8,padding:"0 12px 12px"}}>{!run?<button onClick={()=>{setRun(true);bip(1000,.25,.35)}} className="btn" style={{flex:1,padding:12,borderRadius:10,background:"linear-gradient(135deg,"+pC+","+pC+"cc)"}}>{rd===1&&ei===0?"EMPEZAR":"SEGUIR"}</button>:<button onClick={()=>{clearInterval(ref.current);setRun(false)}} className="btn" style={{flex:1,padding:12,borderRadius:10,background:"rgba(245,158,11,.15)",color:"#f59e0b"}}>PAUSA</button>}<button onClick={reset} style={{padding:"12px 16px",borderRadius:10,border:"1px solid rgba(255,255,255,.08)",background:"transparent",color:"#8888aa",fontSize:13,cursor:"pointer"}}>↺</button></div></div>);
}

function CRow({label,done,onTap,crit,pts}){

function MiniChart({points,color,label,unit}){
  if(!points||points.length<2)return null;
  var vals=points.map(p=>p.v),mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1,w=280,h=90,pad=10,step=(w-pad*2)/Math.max(points.length-1,1);
  var pathD=points.map((p,i)=>{var x=pad+i*step,y=h-pad-((p.v-mn)/range)*(h-pad*2);return(i===0?"M":"L")+x+","+y}).join(" ");var diff=vals[vals.length-1]-vals[0];
  return(<div className="card"><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700,color}}>{label}</span><span style={{fontSize:13,fontWeight:700,color}}>{vals[vals.length-1]} {unit}</span></div><svg viewBox={"0 0 "+w+" "+h} style={{width:"100%",height:90}}><path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>{points.map((p,i)=>{var x=pad+i*step,y=h-pad-((p.v-mn)/range)*(h-pad*2);return<circle key={i} cx={x} cy={y} r={i===points.length-1?4:2.5} fill={i===points.length-1?color:color+"88"}/>})}</svg><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#555570",marginTop:4}}><span>{points[0].l}</span><span>{points[points.length-1].l}</span></div><div style={{fontSize:12,marginTop:6,color:diff<0?"#22c55e":diff>0?"#ef4444":"#8888aa",fontWeight:600}}>{diff<0?"↓ ":"↑ "}{Math.abs(diff).toFixed(1)} {unit}</div></div>);
}

  const[aex,setAex]=useState(0);

  const[toast,setToast]=useState(null);
  const[wi,setWi]=useState("");
  const[ri,setRi]=useState(0);

    <div className="header">
      <div style={{position:"absolute",top:"-50%",right:"-20%",width:160,height:160,background:"radial-gradient(circle,"+accent+",transparent 70%)",opacity:.07,borderRadius:"50%"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,position:"relative"}}><div style={{fontSize:24,fontWeight:800,background:"linear-gradient(135deg,#f0f0f5,"+accent+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{DAYS_FULL[today]}</div><div style={{background:accent,color:"#0f0f1a",padding:"5px 12px",borderRadius:18,fontWeight:700,fontSize:12}}>{dm.ic} {dm.l}</div></div>
      <div style={{color:"#8888aa",fontSize:12}}>{new Date().toLocaleDateString("es-ES",{day:"numeric",month:"long"})} - <span style={{color:accent,fontWeight:600}}>{wp}/{WEEKLY_GOAL} pts</span>{streak>0&&<span style={{color:"#f59e0b",marginLeft:8}}>🔥{streak}w</span>}</div>
    </div>
    {ar?renderRoutine():<>{view==="home"&&renderHome()}{view==="steps"&&renderRoutes()}{view==="evo"&&renderEvo()}{view==="plan"&&renderPlan()}</>}
    {!ar&&<div className="nav">{[{id:"home",ic:"🏠",l:"Hoy"},{id:"steps",ic:"🚶",l:"Rutas"},{id:"evo",ic:"📈",l:"Evolucion"},{id:"plan",ic:"📋",l:"Plan"}].map(tab=><button key={tab.id} onClick={()=>setView(tab.id)} style={{color:view===tab.id?accent:"#555570"}}><span style={{fontSize:20}}>{tab.ic}</span><span style={{fontSize:10,fontWeight:600}}>{tab.l}</span></button>)}</div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
